<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>祈晴燒烏龜</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      min-height: 100vh;
      background: linear-gradient(to bottom, #b9e3ff 0%, #dff4ff 45%, #fff7e8 100%);
      overflow-x: hidden;
      color: #4b5563;
    }

    .rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .drop {
      position: absolute;
      top: -20px;
      width: 2px;
      height: 18px;
      background: rgba(255,255,255,0.75);
      border-radius: 999px;
      animation: rainFall linear infinite;
    }

    @keyframes rainFall {
      to {
        transform: translateY(110vh);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 20px 48px;
      text-align: center;
    }

    h1 {
      margin: 12px 0 8px;
      font-size: clamp(32px, 5vw, 52px);
      color: #ff7b7b;
      text-shadow: 0 2px 0 rgba(255,255,255,0.7);
    }

    .subtitle {
      font-size: 16px;
      margin-bottom: 24px;
      color: #6b7280;
    }

    .panel {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      border: 2px solid #ffffff;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      align-items: center;
    }

    .controls label {
      font-size: 16px;
      font-weight: 700;
      color: #374151;
    }

    .controls input {
      width: 90px;
      padding: 10px 12px;
      font-size: 18px;
      border-radius: 14px;
      border: 2px solid #ffd5d5;
      outline: none;
      text-align: center;
      background: #fffdfd;
    }

    .controls button {
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s;
      box-shadow: 0 6px 16px rgba(255, 132, 132, 0.25);
    }

    .start-btn {
      background: linear-gradient(135deg, #ff9a9e, #ffb86c);
      color: white;
    }

    .reset-btn {
      background: #ffffff;
      color: #ff7b7b;
      border: 2px solid #ffd3d3;
    }

    .controls button:hover {
      transform: translateY(-2px);
    }

    .controls button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      margin-top: 14px;
      font-size: 17px;
      font-weight: 700;
      color: #6366f1;
      min-height: 26px;
    }

    .stage {
      position: relative;
      min-height: 430px;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.85), rgba(255,255,255,0) 18%),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,0.85), rgba(255,255,255,0) 16%),
        linear-gradient(to bottom, #ccecff 0%, #eaf8ff 65%, #eaffd9 65%, #c8f6b7 100%);
      border: 3px solid rgba(255,255,255,0.85);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35), 0 18px 30px rgba(0,0,0,0.08);
    }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100px;
      background: linear-gradient(to top, #99df85, #bdf0a7);
    }

    .sun {
      position: absolute;
      top: 28px;
      right: 42px;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8b8, #ffd84d 70%);
      box-shadow: 0 0 35px rgba(255, 219, 77, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      opacity: 0;
      transform: scale(0.7);
      transition: all 0.8s ease;
      z-index: 2;
    }

    .sun.show {
      opacity: 1;
      transform: scale(1);
    }

    .rainbow {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 95px;
      width: 280px;
      height: 140px;
      border-top-left-radius: 160px;
      border-top-right-radius: 160px;
      border: 12px solid transparent;
      border-bottom: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
      background:
        linear-gradient(to right,
          #ff7b7b 0%, #ff7b7b 16.6%,
          #ffb347 16.6%, #ffb347 33.2%,
          #ffe066 33.2%, #ffe066 49.8%,
          #8be28b 49.8%, #8be28b 66.4%,
          #7db8ff 66.4%, #7db8ff 83%,
          #b190ff 83%, #b190ff 100%);
      clip-path: ellipse(50% 50% at 50% 100%);
      z-index: 1;
    }

    .rainbow.show {
      opacity: 0.9;
    }

    .turtle-area {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 105px;
      top: 90px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
      gap: 16px;
      padding: 8px 10px 20px;
      z-index: 3;
    }

    .turtle-wrap {
      position: relative;
      width: 110px;
      height: 105px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: floaty 2.4s ease-in-out infinite;
    }

    .turtle-wrap:nth-child(2n) {
      animation-delay: 0.2s;
    }

    .turtle-wrap:nth-child(3n) {
      animation-delay: 0.45s;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .turtle {
      position: relative;
      width: 90px;
      height: 58px;
    }

    .shell {
      position: absolute;
      left: 18px;
      top: 12px;
      width: 50px;
      height: 34px;
      background: #77c66e;
      border: 3px solid #4f9150;
      border-radius: 50% 50% 45% 45%;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.12);
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
    }

    .shell::before {
      background:
        radial-gradient(circle at 50% 40%, transparent 0 8px, #5da85c 8px 10px, transparent 10px),
        linear-gradient(90deg, transparent 0 32%, #5da85c 32% 36%, transparent 36% 64%, #5da85c 64% 68%, transparent 68%),
        linear-gradient(0deg, transparent 0 35%, #5da85c 35% 39%, transparent 39% 61%, #5da85c 61% 65%, transparent 65%);
      opacity: 0.8;
    }

    .head {
      position: absolute;
      right: 6px;
      top: 19px;
      width: 23px;
      height: 20px;
      background: #a5dc8d;
      border: 3px solid #4f9150;
      border-radius: 50%;
    }

    .eye {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #2c3e50;
      border-radius: 50%;
      top: 7px;
    }

    .eye.left { left: 6px; }
    .eye.right { right: 6px; }

    .blush {
      position: absolute;
      width: 6px;
      height: 4px;
      background: #ffb4b4;
      border-radius: 50%;
      bottom: 3px;
      opacity: 0.9;
    }

    .blush.left { left: 4px; }
    .blush.right { right: 4px; }

    .leg {
      position: absolute;
      width: 12px;
      height: 10px;
      background: #a5dc8d;
      border: 2px solid #4f9150;
      border-radius: 50%;
      bottom: 3px;
    }

    .leg.lf { left: 18px; }
    .leg.rf { left: 48px; }
    .leg.lb { left: 24px; bottom: -2px; }
    .leg.rb { left: 52px; bottom: -2px; }

    .tail {
      position: absolute;
      left: 8px;
      top: 31px;
      width: 10px;
      height: 10px;
      border-left: 3px solid #4f9150;
      border-bottom: 3px solid #4f9150;
      transform: rotate(45deg);
      border-radius: 3px;
    }

    .flame {
      position: absolute;
      bottom: 2px;
      font-size: 22px;
      opacity: 0;
      transform: translateY(5px) scale(0.7);
      transition: all 0.25s ease;
      filter: drop-shadow(0 3px 4px rgba(255, 150, 64, 0.35));
    }

    .turtle-wrap.burning .flame {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: flicker 0.5s ease-in-out infinite alternate;
    }

    @keyframes flicker {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-3px) scale(1.08); }
    }

    .turtle-wrap.burning .turtle {
      animation: shake 0.35s ease-in-out 3;
    }

    @keyframes shake {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
      75% { transform: rotate(-3deg); }
      100% { transform: rotate(0deg); }
    }

    .poof {
      position: absolute;
      font-size: 28px;
      opacity: 0;
      transform: scale(0.5);
      pointer-events: none;
    }

    .turtle-wrap.gone .turtle,
    .turtle-wrap.gone .flame {
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .turtle-wrap.gone .poof {
      opacity: 1;
      transform: scale(1.2);
      transition: all 0.35s ease;
      animation: poofUp 0.8s ease forwards;
    }

    @keyframes poofUp {
      0% { opacity: 1; transform: translateY(0) scale(0.9); }
      100% { opacity: 0; transform: translateY(-22px) scale(1.4); }
    }

    .wish {
      margin-top: 18px;
      font-size: 20px;
      font-weight: 800;
      color: #ff8a65;
      min-height: 34px;
    }

    .footer-note {
      margin-top: 12px;
      font-size: 13px;
      color: #94a3b8;
    }

    @media (max-width: 640px) {
      .turtle-wrap {
        width: 90px;
        height: 92px;
      }

      .turtle {
        transform: scale(0.9);
      }

      .stage {
        min-height: 500px;
      }
    }
  </style>
</head>
<body>
  <div class="rain" id="rain"></div>

  <div class="container">
    <h1>祈晴燒烏龜 ☀️🐢🔥</h1>
    <div class="subtitle">最近一直下雨，只好可愛地祈求好天氣！</div>

    <div class="panel">
      <div class="controls">
        <label for="turtleCount">要燒幾隻烏龜：</label>
        <input id="turtleCount" type="number" min="1" max="30" value="3" />
        <button class="start-btn" id="startBtn">開始祈晴</button>
        <button class="reset-btn" id="resetBtn">重來一次</button>
      </div>
      <div class="status" id="status">輸入數量後按下「開始祈晴」</div>
    </div>

    <div class="stage">
      <div class="sun" id="sun">☀️</div>
      <div class="rainbow" id="rainbow"></div>
      <div class="turtle-area" id="turtleArea"></div>
      <div class="ground"></div>
    </div>

    <div class="wish" id="wishText"></div>
    <div class="footer-note">純屬趣味祈晴小網站，可愛版演出、無血腥內容</div>
  </div>

  <script>
    const turtleArea = document.getElementById("turtleArea");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const turtleCountInput = document.getElementById("turtleCount");
    const status = document.getElementById("status");
    const wishText = document.getElementById("wishText");
    const sun = document.getElementById("sun");
    const rainbow = document.getElementById("rainbow");
    const rain = document.getElementById("rain");

    let isRunning = false;

    function createRain() {
      rain.innerHTML = "";
      for (let i = 0; i < 70; i++) {
        const drop = document.createElement("div");
        drop.className = "drop";
        drop.style.left = Math.random() * 100 + "vw";
        drop.style.animationDuration = (0.7 + Math.random() * 0.9) + "s";
        drop.style.animationDelay = (Math.random() * 1.5) + "s";
        drop.style.opacity = 0.35 + Math.random() * 0.5;
        drop.style.height = (10 + Math.random() * 18) + "px";
        rain.appendChild(drop);
      }
    }

    function createTurtle() {
      const wrap = document.createElement("div");
      wrap.className = "turtle-wrap";
      wrap.innerHTML = `
        <div class="flame">🔥</div>
        <div class="poof">☁️✨</div>
        <div class="turtle">
          <div class="shell"></div>
          <div class="head">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
          </div>
          <div class="leg lf"></div>
          <div class="leg rf"></div>
          <div class="leg lb"></div>
          <div class="leg rb"></div>
          <div class="tail"></div>
        </div>
      `;
      return wrap;
    }

    function renderTurtles(count) {
      turtleArea.innerHTML = "";
      for (let i = 0; i < count; i++) {
        turtleArea.appendChild(createTurtle());
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startCeremony() {
      const count = parseInt(turtleCountInput.value, 10);

      if (!count || count < 1) {
        alert("請輸入至少 1 隻烏龜！");
        return;
      }

      if (count > 30) {
        alert("最多 30 隻就好，不然場面太壯觀啦！");
        return;
      }

      isRunning = true;
      startBtn.disabled = true;
      turtleCountInput.disabled = true;
      wishText.textContent = "";
      sun.classList.remove("show");
      rainbow.classList.remove("show");

      renderTurtles(count);

      const turtles = [...document.querySelectorAll(".turtle-wrap")];
      status.textContent = `正在召喚晴天中… 共 ${count} 隻烏龜出動！`;

      for (let i = 0; i < turtles.length; i++) {
        status.textContent = `第 ${i + 1} 隻烏龜祈晴中…`;
        turtles[i].classList.add("burning");
        await sleep(650);
        turtles[i].classList.remove("burning");
        turtles[i].classList.add("gone");
        await sleep(260);
      }

      status.textContent = "祈晴成功！天氣好像要變好了！";
      wishText.textContent = "拜託後天放晴呀～ ☀️🌈✨";
      sun.classList.add("show");
      rainbow.classList.add("show");

      // 雨變少
      const drops = document.querySelectorAll(".drop");
      drops.forEach((d, idx) => {
        setTimeout(() => {
          d.style.transition = "opacity 0.8s ease";
          d.style.opacity = "0";
        }, idx * 6);
      });

      isRunning = false;
      startBtn.disabled = false;
      turtleCountInput.disabled = false;
    }

    function resetAll() {
      if (isRunning) return;
      turtleArea.innerHTML = "";
      status.textContent = "輸入數量後按下「開始祈晴」";
      wishText.textContent = "";
      sun.classList.remove("show");
      rainbow.classList.remove("show");
      createRain();
    }

    startBtn.addEventListener("click", startCeremony);
    resetBtn.addEventListener("click", resetAll);

    createRain();
    renderTurtles(3);
  </script>
</body>
</html>
